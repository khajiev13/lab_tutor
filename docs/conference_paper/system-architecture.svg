<text x="900" y="108" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#475569" text-anchor="middle">Task 1 builds the baseline scaffold, Tasks 2 and 3 enrich it independently, and Task 4 turns the enriched graph into learning support.</text>
